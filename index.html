<!DOCTYPE html>
<html > 
<head> 
    <title>Login</title>
    <style>        
        body{
        height: 98vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url(starfall.gif);
        background-position: center;
        background-size: cover;
        }          
                            
        .login{
        display: flex;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.75);
        overflow: hidden;               
        border: 1px solid rgba(0, 0, 0, 0.500);
        width: 500px;
        height: 600px;
        border-radius: 20px;     
        }

        form {
        display:block;
        box-sizing: border-box;
        backdrop-filter: blur(2px) brightness(0.6);
        height: 100%;
        width: 100%;
        padding: 40px;
        flex-direction: column;
        display:flex;
        gap: 10px;
        }
        h1{
        text-align: center;
        font-size: 45px;
        text-transform: uppercase;
        text-shadow: 0px 0px 20px rgb(0,0,0,0.75);
        }

        label{
        text-transform: uppercase;
        font-size: 11px;
        padding-left: 10px;
        }

        .text{
        all: unset;
        height: 38px;        
        border-radius: 18px;
        border: 2px solid transparent;
        background-color: rgb(255, 255, 255, 0.3);
        font-size: 19PX;
        padding-left: 10px;
        transition: border .25s ease-in-out;
        }

        .ps{
        all: unset;
        height: 38px; 
        width: 430px;       
        border-radius: 18px;
        border: 2px solid transparent;
        background-color: rgb(255, 255, 255, 0.3);
        font-size: 19PX;
        padding-left: 10px;
        transition: border .25s ease-in-out;
        }

        button{
        border-radius: 18px;
        border-color: rgb(0, 162, 255);
        height: 35px;
        background-color: rgb(0, 162, 255);
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;        
        }
        input:focus{
            border-color: rgb(0, 162, 255);
        }
        
        .psw {
        display: flex;
        position: absolute;
        right: 5px; 
        width: 24px;
        height: 24px;
        appearance: none;        
        background-color: rgba(255, 255, 255, 0.3);
        border: 2px solid rgb(0, 162, 255);
        border-radius: 50%;
        cursor: pointer;
        transition: background-color 0.3s;        
        }

        .psw:checked {
        background-color: rgba(0, 162, 255, 0.7);
        box-shadow: 0 0 0 2px rgba(255,255,255,0.6) inset;
        }               

        .linea{
        display: inline-flex;
        align-items: center;
        position: relative;
        
        }
    </style>
</head>

<body>
    <div class="login">
        <form class="posizione" >
            <h1 style="color: white;">Login</h1>
            <label  style=" color: white;">Username:</label>
            <input type="text" class="text">
            <label style="color: white;">Password:</label>
            <div class="linea">
                <input type="password" class="ps" id="psd">
                <input type="checkbox" class="psw" onclick="psd.type = this.
                checked ? 'text' : 'password'">                      
            </div>            
            <button type="button" onclick="alert('Login eseguito con successo!')"> Sign in</button>
        </form>
    </div>
</body>    
</html>
